{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="bg-white p-6 rounded-lg shadow-lg max-w-md mx-auto">
  <h1 class="text-2xl font-bold mb-4">Login</h1>
  <form id="login-form" class="space-y-4">
    <div>
      <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
      <input type="text" id="username" name="username"
        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg">
    </div>
    <div>
      <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
      <input type="password" id="password" name="password"
        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg">
    </div>
    <button type="submit" class="w-full bg-green-500 text-white px-4 py-2 rounded-lg">Login</button>
  </form>
  <p class="mt-4 text-center">Don't have an account? <a href="/register" class="text-blue-500">Register here</a></p>
</div>
{% endblock %}
